<svg xmlns="http://www.w3.org/2000/svg" width="720" viewBox="0 0 720 492" role="img" aria-labelledby="lv-title lv-desc">
<title id="lv-title">AgentEchelon deployable components</title>
<desc id="lv-desc">The deployable components, each running on the one below. First the primary core (the foundations) is deployed on AWS managed services. The chat interface and the admin backend both sit on the primary core. The admin interface sits on top of the admin backend. So the chat interface reaches the platform in one hop; the admin interface takes two. Teal marks the core side, pink marks the admin side.</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
.h{font-size:14px;font-weight:600}.s{font-size:11.5px;font-weight:400}.plain{fill:#5F5E5A}
.ln{stroke:#8A8880;stroke-width:1.3;fill:none}
.badge{fill:none;stroke:#8A8880;stroke-width:1.2}.bnum{font-size:12px;font-weight:700;fill:#5F5E5A}
.teal rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:.6}.teal .h{fill:#085041}.teal .s{fill:#0F6E56}
.pink rect{fill:#FBEAF0;stroke:#993556;stroke-width:.6}.pink .h{fill:#72243E}.pink .s{fill:#993556}
.gray rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:.6}.gray .h{fill:#444441}.gray .s{fill:#5F5E5A}
@media(prefers-color-scheme:dark){
.plain{fill:#B4B2A9}.ln{stroke:#B4B2A9}.badge{stroke:#B4B2A9}.bnum{fill:#B4B2A9}
.teal rect{fill:#085041;stroke:#5DCAA5}.teal .h{fill:#9FE1CB}.teal .s{fill:#5DCAA5}
.pink rect{fill:#72243E;stroke:#ED93B1}.pink .h{fill:#F4C0D1}.pink .s{fill:#ED93B1}
.gray rect{fill:#444441;stroke:#B4B2A9}.gray .h{fill:#D3D1C7}.gray .s{fill:#B4B2A9}
}
</style>
<defs><marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#8A8880" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="pink"><rect x="380" y="44" width="252" height="84" rx="9"/><text class="h" x="506" y="76" text-anchor="middle">Admin interface</text><text class="s" x="506" y="98" text-anchor="middle">The operator app -</text><text class="s" x="506" y="114" text-anchor="middle">runs on the admin backend.</text></g>
<circle class="badge" cx="398" cy="62" r="10"/><text class="bnum" x="398" y="66" text-anchor="middle">3</text>
<g class="teal"><rect x="88" y="150" width="252" height="92" rx="9"/><text class="h" x="214" y="184" text-anchor="middle">Chat interface</text><text class="s" x="214" y="206" text-anchor="middle">The end-user app -</text><text class="s" x="214" y="222" text-anchor="middle">runs on the primary core.</text></g>
<circle class="badge" cx="106" cy="168" r="10"/><text class="bnum" x="106" y="172" text-anchor="middle">2</text>
<g class="pink"><rect x="380" y="150" width="252" height="92" rx="9"/><text class="h" x="506" y="176" text-anchor="middle">Admin backend</text><text class="s" x="506" y="196" text-anchor="middle">Operator platform on the core:</text><text class="s" x="506" y="212" text-anchor="middle">read any conversation, moderate,</text><text class="s" x="506" y="228" text-anchor="middle">delete, audit - all IAM-enforced.</text></g>
<circle class="badge" cx="398" cy="168" r="10"/><text class="bnum" x="398" y="172" text-anchor="middle">2</text>
<g class="teal"><rect x="88" y="270" width="544" height="92" rx="9"/><text class="h" x="360" y="298" text-anchor="middle">Primary core - the foundations, deployed first</text><text class="s" x="360" y="320" text-anchor="middle">The shared engine everyone runs on: conversations, assistants,</text><text class="s" x="360" y="337" text-anchor="middle">identity &amp; access, model calls, the durable record.</text></g>
<circle class="badge" cx="106" cy="288" r="10"/><text class="bnum" x="106" y="292" text-anchor="middle">1</text>
<g class="gray"><rect x="88" y="390" width="544" height="62" rx="9"/><text class="h" x="360" y="415" text-anchor="middle">AWS managed services</text><text class="s" x="360" y="435" text-anchor="middle">Amazon Chime SDK Messaging &amp; Identity · Amazon Bedrock · Cognito / STS · IAM · Kinesis · S3</text></g>
<line class="ln" x1="506" y1="128" x2="506" y2="150" marker-end="url(#ag)"/>
<text class="s plain" x="514" y="143">runs on</text>
<line class="ln" x1="214" y1="242" x2="214" y2="270" marker-end="url(#ag)"/>
<text class="s plain" x="222" y="259">runs on</text>
<line class="ln" x1="506" y1="242" x2="506" y2="270" marker-end="url(#ag)"/>
<text class="s plain" x="514" y="259">builds on</text>
<line class="ln" x1="360" y1="362" x2="360" y2="390" marker-end="url(#ag)"/>
<text class="s plain" x="368" y="379">runs on</text>
<text class="s plain" x="88" y="474">Deploy order: (1) the primary core first; then (2) the chat interface and the admin backend on it; then (3) the admin interface on the admin backend.</text>
<text class="s plain" x="88" y="490">Each level runs on the one below. The chat interface needs only the core; the admin interface needs the admin backend too. Teal = core · pink = admin.</text>
</svg>
