<svg xmlns="http://www.w3.org/2000/svg" width="720" viewBox="0 0 720 408" role="img" aria-labelledby="pl-title pl-desc">
<title id="pl-title">AgentEchelon architectural stack</title>
<desc id="pl-desc">Four layers, each running on the one below. Interface: the client surfaces - an end-user app (a web chat client today, built) and the operator admin app (built), with mobile and phone on the roadmap and email partially built. Communication: the connectivity that wires each client to the engine - WebSocket and REST for messaging (built), WebRTC (roadmap), email (partially built - outbound only), and voice over PSTN (roadmap). Interaction: the engine - AgentEchelon's own code (assistants, memory, routing, the IAM policy and tags it authors, config, auditing) over the AWS services it composes (Amazon Chime SDK Messaging, Amazon Lex, Amazon Bedrock, Amazon Cognito / STS, and AWS IAM, which enforces the access decision). Foundations: deployment and management. Colour key: teal = AgentEchelon-built, grey = AWS service, beige = partially built, dashed = roadmap.</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
.h{font-size:14px;font-weight:600}.s{font-size:11.5px;font-weight:400}.plain{fill:#5F5E5A}
.lbl{font-size:11px;font-weight:700;letter-spacing:.05em;fill:#5F5E5A}.subl{font-size:9px;font-weight:600;fill:#8A8880}
.teal rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:.6}.teal .h{fill:#085041}.teal .s{fill:#0F6E56}
.amber rect{fill:#FAEEDA;stroke:#854F0B;stroke-width:.6}.amber .h{fill:#633806}.amber .s{fill:#854F0B}
.rm rect{fill:none;stroke:#8A8880;stroke-width:1;stroke-dasharray:4 3}.rm .h{fill:#6B6A64}.rm .s{fill:#6B6A64}
.gray rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:.6}.gray .h{fill:#444441}.gray .s{fill:#5F5E5A}
.kt{fill:#E1F5EE;stroke:#0F6E56;stroke-width:.8}.kg{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:.8}.ka{fill:#FAEEDA;stroke:#854F0B;stroke-width:.8}.kr{fill:none;stroke:#8A8880;stroke-width:1;stroke-dasharray:4 3}
@media(prefers-color-scheme:dark){
.plain{fill:#B4B2A9}.lbl{fill:#B4B2A9}.subl{fill:#8A8880}
.teal rect{fill:#085041;stroke:#5DCAA5}.teal .h{fill:#9FE1CB}.teal .s{fill:#5DCAA5}
.amber rect{fill:#633806;stroke:#EF9F27}.amber .h{fill:#FAC775}.amber .s{fill:#EF9F27}
.rm rect{stroke:#8A8880}.rm .h{fill:#9C9A92}.rm .s{fill:#9C9A92}
.gray rect{fill:#444441;stroke:#B4B2A9}.gray .h{fill:#D3D1C7}.gray .s{fill:#B4B2A9}
.kt{fill:#085041;stroke:#5DCAA5}.kg{fill:#444441;stroke:#B4B2A9}.ka{fill:#633806;stroke:#EF9F27}.kr{stroke:#8A8880}
