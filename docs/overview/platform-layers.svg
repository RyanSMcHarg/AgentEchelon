<g class="gray"><rect x="138" y="274" width="566" height="54" rx="8"/><text class="h" x="421" y="292" text-anchor="middle">The AWS services it composes</text><text class="s" x="421" y="310" text-anchor="middle">Amazon Chime SDK Messaging (conversations · identity · roles · retention · channel flows)</text><text class="s" x="421" y="326" text-anchor="middle">Amazon Lex · Amazon Bedrock · Amazon Cognito / STS · AWS IAM, which enforces the access decision</text></g>
<text class="lbl" x="126" y="344" text-anchor="end">FOUNDATIONS</text><text class="subl" x="126" y="358" text-anchor="end">deploy + manage</text>
