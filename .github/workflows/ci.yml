name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend build + CDK synth
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: CDK synth (Athena mode, default)
        run: npx cdk synth
        env:
          # Dummy values to satisfy CDK environment resolution during synth
          CDK_DEFAULT_ACCOUNT: '123456789012'
          CDK_DEFAULT_REGION: 'us-east-1'

  frontend:
    name: Frontend lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Placeholder values so the build doesn't fail on missing env vars
          VITE_AWS_REGION: us-east-1
          VITE_USER_POOL_ID: placeholder
          VITE_CLIENT_ID: placeholder
          VITE_IDENTITY_POOL_ID: placeholder
          VITE_APP_INSTANCE_ARN: placeholder
          VITE_BOT_ARN: placeholder
          VITE_CREATE_CONVERSATION_API_URL: https://placeholder.example.com
          VITE_ADD_BOT_API_URL: https://placeholder.example.com
          VITE_SHARE_CONVERSATION_API_URL: https://placeholder.example.com
          VITE_PRESIGNED_URL_API_URL: https://placeholder.example.com
          VITE_ANALYTICS_API_URL: https://placeholder.example.com

